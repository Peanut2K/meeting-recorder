name: Supabase keep-alive

# Free Supabase projects pause after ~7 days of inactivity. Ping the REST API
# every 3 days so the database stays awake. Needs two repo secrets:
#   SUPABASE_URL       e.g. https://xxxx.supabase.co
#   SUPABASE_ANON_KEY  the project's anon/public key
on:
  schedule:
    - cron: '0 6 */3 * *' # every 3 days at 06:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -sf "$SUPABASE_URL/rest/v1/users?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" > /dev/null
          echo "Supabase pinged OK"
